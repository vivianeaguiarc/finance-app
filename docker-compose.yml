name: finance-app

networks:
  financeapp-network:
    driver: bridge

volumes:
  financeapp-postgres-data:
  financeapp-postgres-test-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: financeapp-postgres
    networks:
      - financeapp-network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finance_app
    volumes:
      - financeapp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d finance_app']
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: financeapp-redis
    networks:
      - financeapp-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financeapp-api
    networks:
      - financeapp-network
    ports:
      - '3000:3000'
    env_file:
      - path: .env.docker
        required: false
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/finance_app
      REDIS_URL: redis://redis:6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-docker_dev_access_secret_change_me_min_32_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-docker_dev_refresh_secret_change_me_min_32_chars}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres-test:
    profiles:
      - test
    image: postgres:16-alpine
    container_name: financeapp-postgres-test
    networks:
      - financeapp-network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finance_app_test
    ports:
      - '5434:5432'
    volumes:
      - financeapp-postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d finance_app_test']
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
